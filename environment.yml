name: pytorch_gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    - torch>=2.0.0
    - torchvision>=0.21.0
    - torchaudio>=2.0.0
    - transformers>=4.40.0
    - chromadb>=0.5.0
    - fastapi>=0.110.0
    - uvicorn>=0.27.0
    - python-multipart>=0.0.9
    - openai>=1.0.0
    - pillow>=10.0.0
    - onnxruntime>=1.17.0
